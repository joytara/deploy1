<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Static Website</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100">
    <!-- Navbar -->
    <nav class="bg-blue-600 text-white p-4 flex justify-between">
      <h1 class="text-xl font-bold">My Website</h1>
      <button
        onclick="showMessage()"
        class="bg-white text-blue-600 px-3 py-1 rounded"
      >
        Click Me
      </button>
    </nav>

    <!-- Hero Section -->
    <section class="text-center mt-10">
      <h2 class="text-3xl font-bold">Welcome to My Static Site 🚀</h2>
      <p class="mt-4 text-gray-600">This site is deployed using GitHub Pages</p>

      <button
        onclick="changeColor()"
        class="mt-6 bg-green-500 text-white px-4 py-2 rounded"
      >
        Change Background Color
      </button>
    </section>

    <!-- Message Area -->
    <div
      id="messageBox"
      class="hidden mt-6 text-center text-lg font-semibold text-blue-600"
    >
      Button Clicked Successfully with joy!
    </div>

    <!-- JS file link -->
    <script src="script.js"></script>
  </body>
</html>
